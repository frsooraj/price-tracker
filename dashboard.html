<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PricePulse Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #080c10;
    --panel: #0d1117;
    --border: #1e2d3d;
    --accent: #00ff88;
    --accent2: #ff4444;
    --accent3: #ffaa00;
    --text: #c9d1d9;
    --muted: #4a5568;
    --card: #111820;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    background: rgba(8,12,16,0.9);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .live-badge {
    font-size: 0.65rem;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 2px;
  }

  .last-updated {
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin: 24px 0;
  }

  .stat {
    background: var(--panel);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .stat::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.6s ease;
  }

  .stat:hover::after { transform: scaleX(1); }

  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--accent);
  }

  .stat-sub {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Section */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Product grid */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 20px;
    position: relative;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
    animation: fadeIn 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .product-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .product-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .product-card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    gap: 12px;
  }

  .product-name {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
  }

  .product-id {
    font-size: 0.6rem;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 6px;
    white-space: nowrap;
  }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 12px;
  }

  .current-price {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--accent);
  }

  .price-change {
    font-size: 0.75rem;
    padding: 2px 6px;
  }

  .price-change.down { color: var(--accent); background: rgba(0,255,136,0.1); }
  .price-change.up { color: var(--accent2); background: rgba(255,68,68,0.1); }
  .price-change.same { color: var(--muted); background: rgba(74,85,104,0.1); }

  .card-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .meta-item { }

  .meta-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .meta-value {
    font-size: 0.8rem;
    color: var(--text);
  }

  .meta-value.low { color: var(--accent); }
  .meta-value.target { color: var(--accent3); }
  .meta-value.no-target { color: var(--muted); }

  /* Mini chart */
  .mini-chart-wrap {
    height: 60px;
    margin-bottom: 14px;
    position: relative;
  }

  .card-footer {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-primary {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
  }

  .btn-primary:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
  }

  .btn-danger:hover {
    background: var(--accent2);
    color: white;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,12,16,0.92);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    width: 90%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
    position: relative;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-close:hover { border-color: var(--accent2); color: var(--accent2); }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 6px;
    padding-right: 40px;
  }

  .modal-price {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .chart-wrap {
    height: 220px;
    margin-bottom: 24px;
  }

  .history-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
  }

  .history-table th {
    text-align: left;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-size: 0.65rem;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .history-table td {
    padding: 10px 0;
    border-bottom: 1px solid rgba(30,45,61,0.5);
    color: var(--text);
  }

  .history-table td:last-child { text-align: right; }

  .history-table tr:last-child td { border-bottom: none; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-text {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    margin-bottom: 8px;
    color: var(--text);
  }

  .empty-sub { font-size: 0.75rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* Responsive */
  @media (max-width: 768px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .products-grid { grid-template-columns: 1fr; }
    .stat-value { font-size: 1.4rem; }
  }

  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: 1fr 1fr; }
  }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--panel);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 20px;
    font-size: 0.75rem;
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--accent2); color: var(--accent2); }

  .url-link {
    font-size: 0.65rem;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px dashed var(--border);
    transition: color 0.15s;
    word-break: break-all;
    display: block;
    margin-bottom: 16px;
  }

  .url-link:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-dot"></div>
        PricePulse
        <span class="live-badge">LIVE</span>
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        <span class="last-updated" id="lastUpdated">Loading...</span>
        <button class="refresh-btn" onclick="loadData(true)">↻ Refresh</button>
      </div>
    </div>
  </div>
</header>

<div class="container" style="padding-top:0">

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Total Products</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-sub">being tracked</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total Users</div>
      <div class="stat-value" id="statUsers">—</div>
      <div class="stat-sub">registered</div>
    </div>
    <div class="stat">
      <div class="stat-label">Lowest Deal</div>
      <div class="stat-value" id="statLowest" style="font-size:1.3rem">—</div>
      <div class="stat-sub" id="statLowestName">across all products</div>
    </div>
    <div class="stat">
      <div class="stat-label">Price Checks</div>
      <div class="stat-value" id="statChecks">—</div>
      <div class="stat-sub">total logged</div>
    </div>
  </div>

  <!-- Products -->
  <div class="section-title">Tracked Products</div>
  <div class="products-grid" id="productsGrid">
    <div class="empty-state">
      <div class="empty-icon">◌</div>
      <div class="empty-text">Loading...</div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-price" id="modalPrice"></div>
    <a class="url-link" id="modalUrl" target="_blank"></a>
    <div class="chart-wrap">
      <canvas id="priceChart"></canvas>
    </div>
    <table class="history-table">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th style="text-align:right">Price</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let chartInstance = null;
let allProducts = [];

async function loadData(showSpinner = false) {
  const btn = document.querySelector('.refresh-btn');
  if (showSpinner) btn.classList.add('spinning');

  try {
    const res = await fetch('/api/products');
    const data = await res.json();
    allProducts = data.products;
    renderStats(data);
    renderProducts(data.products);
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    showToast('Failed to load data', true);
  } finally {
    btn.classList.remove('spinning');
  }
}

function renderStats(data) {
  document.getElementById('statTotal').textContent = data.total_products;
  document.getElementById('statUsers').textContent = data.total_users;
  document.getElementById('statChecks').textContent = data.total_logs;

  if (data.best_deal) {
    document.getElementById('statLowest').textContent = '₹' + data.best_deal.lowest.toLocaleString('en-IN');
    document.getElementById('statLowestName').textContent = data.best_deal.name.substring(0, 25) + '..';
  }
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');

  if (!products.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">◌</div>
        <div class="empty-text">No products tracked yet</div>
        <div class="empty-sub">Send an Amazon link to your Telegram bot to start tracking</div>
      </div>`;
    return;
  }

  grid.innerHTML = products.map((p, i) => {
    const changeClass = p.change < 0 ? 'down' : p.change > 0 ? 'up' : 'same';
    const changeText = p.change < 0 ? `▼ ₹${Math.abs(p.change)}` : p.change > 0 ? `▲ ₹${p.change}` : '— no change';
    const targetHtml = p.target_price
      ? `<span class="meta-value target">₹${p.target_price.toLocaleString('en-IN')}</span>`
      : `<span class="meta-value no-target">Not set</span>`;

    return `
    <div class="product-card" style="animation-delay:${i * 0.05}s" onclick="openModal(${p.id})">
      <div class="card-header">
        <div class="product-name">${p.product_name}</div>
        <div class="product-id">#${p.id}</div>
      </div>
      <div class="price-row">
        <div class="current-price">₹${p.current_price.toLocaleString('en-IN')}</div>
        <span class="price-change ${changeClass}">${changeText}</span>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <div class="meta-label">Lowest Ever</div>
          <div class="meta-value low">₹${p.lowest_price ? p.lowest_price.toLocaleString('en-IN') : p.current_price.toLocaleString('en-IN')}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Target Price</div>
          ${targetHtml}
        </div>
        <div class="meta-item">
          <div class="meta-label">Checks Done</div>
          <div class="meta-value">${p.log_count}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">User ID</div>
          <div class="meta-value">${p.user_id}</div>
        </div>
      </div>
      <div class="mini-chart-wrap">
        <canvas id="mini-${p.id}"></canvas>
      </div>
      <div class="card-footer">
        <button class="btn btn-primary" onclick="event.stopPropagation();openModal(${p.id})">📈 History</button>
        <button class="btn btn-danger" onclick="event.stopPropagation();deleteProduct(${p.id}, '${p.product_name.substring(0,20)}')">🗑 Remove</button>
      </div>
    </div>`;
  }).join('');

  // Draw mini charts after render
  setTimeout(() => {
    products.forEach(p => drawMiniChart(p));
  }, 100);
}

function drawMiniChart(p) {
  const canvas = document.getElementById(`mini-${p.id}`);
  if (!canvas || !p.history || p.history.length < 2) return;

  const prices = p.history.map(h => h.price);
  const ctx = canvas.getContext('2d');
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const isDown = prices[prices.length-1] <= prices[0];

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: prices.map(() => ''),
      datasets: [{
        data: prices,
        borderColor: isDown ? '#00ff88' : '#ff4444',
        borderWidth: 1.5,
        fill: true,
        backgroundColor: isDown ? 'rgba(0,255,136,0.05)' : 'rgba(255,68,68,0.05)',
        tension: 0.3,
        pointRadius: 0,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { display: false },
        y: { display: false, min: min * 0.998, max: max * 1.002 }
      },
      animation: false
    }
  });
}

async function openModal(productId) {
  const p = allProducts.find(x => x.id === productId);
  if (!p) return;

  document.getElementById('modalTitle').textContent = p.product_name;
  document.getElementById('modalPrice').textContent = '₹' + p.current_price.toLocaleString('en-IN');
  const urlEl = document.getElementById('modalUrl');
  urlEl.href = p.url;
  urlEl.textContent = p.url;

  document.getElementById('modalOverlay').classList.add('open');

  // History table
  const tbody = document.getElementById('historyBody');
  if (p.history && p.history.length) {
    tbody.innerHTML = [...p.history].reverse().slice(0, 20).map(h => {
      const date = new Date(h.timestamp + ' UTC');
      return `<tr>
        <td>${date.toLocaleString('en-IN')}</td>
        <td style="color:var(--accent);text-align:right">₹${h.price.toLocaleString('en-IN')}</td>
      </tr>`;
    }).join('');
  } else {
    tbody.innerHTML = '<tr><td colspan="2" style="color:var(--muted);padding:20px 0">No history yet</td></tr>';
  }

  // Full chart
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('priceChart').getContext('2d');
  const history = p.history || [];
  const labels = history.map(h => {
    const d = new Date(h.timestamp + ' UTC');
    return d.toLocaleDateString('en-IN', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  });
  const prices = history.map(h => h.price);

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Price ₹',
        data: prices,
        borderColor: '#00ff88',
        borderWidth: 2,
        fill: true,
        backgroundColor: 'rgba(0,255,136,0.05)',
        tension: 0.3,
        pointRadius: 3,
        pointBackgroundColor: '#00ff88',
        pointHoverRadius: 5,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0d1117',
          borderColor: '#1e2d3d',
          borderWidth: 1,
          titleColor: '#4a5568',
          bodyColor: '#00ff88',
          callbacks: { label: ctx => '₹' + ctx.raw.toLocaleString('en-IN') }
        }
      },
      scales: {
        x: {
          ticks: { color: '#4a5568', font: { family: 'Space Mono', size: 9 }, maxTicksLimit: 6 },
          grid: { color: 'rgba(30,45,61,0.5)' }
        },
        y: {
          ticks: { color: '#4a5568', font: { family: 'Space Mono', size: 9 }, callback: v => '₹' + v.toLocaleString('en-IN') },
          grid: { color: 'rgba(30,45,61,0.5)' }
        }
      }
    }
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
}

async function deleteProduct(id, name) {
  if (!confirm(`Remove "${name}.." from tracking?`)) return;
  try {
    const res = await fetch(`/api/delete/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      showToast('Product removed');
      loadData();
    } else {
      showToast('Failed to remove', true);
    }
  } catch(e) {
    showToast('Error removing product', true);
  }
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Keyboard close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Load on start + auto refresh every 60s
loadData();
setInterval(() => loadData(), 60000);
</script>
</body>
</html>
