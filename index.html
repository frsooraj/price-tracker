<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PricePulse | Tracker History</title>
    <style>
        :root {
            --amazon-orange: #FF9900;
            --amazon-blue: #232F3E;
            --bg-light: #f6f6f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 20px;
        }

        header {
            background-color: var(--amazon-blue);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* The Grid for Product Cards */
        #history-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Product Card Styling */
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #fff;
            padding: 10px;
        }

        .card-content {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin: 0 0 10px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-tag {
            font-size: 1.25rem;
            color: #B12704;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .buy-btn {
            background-color: var(--amazon-orange);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .buy-btn:hover {
            background-color: #e68a00;
        }

        .status-msg {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 PricePulse Tracking History</h1>
        <p>Real-time data from your Telegram Bot</p>
    </header>

    <div id="history-container">
        <div class="status-msg">🔄 Connecting to API...</div>
    </div>
</div>

<script>
    async function loadHistory() {
        const container = document.getElementById('history-container');
        try {
            // Fetching data from your Flask API (app.py)
            const response = await fetch('http://127.0.0.1:5000/api/history');
            
            if (!response.ok) throw new Error("API not responding");
            
            const data = await response.json();
            
            if (data.length === 0) {
                container.innerHTML = "<div class='status-msg'>📭 No products tracked yet. Send a link to your bot!</div>";
                return;
            }

            // Generate the HTML for each product card
            container.innerHTML = data.map(item => `
                <div class="product-card">
                    <img class="product-image" src="${item.image_url}" alt="Product">
                    <div class="card-content">
                        <h3 class="product-title">${item.product_name}</h3>
                        <div class="price-tag">₹${item.current_price.toLocaleString()}</div>
                        <a href="${item.url}" target="_blank" class="buy-btn">View on Amazon</a>
                    </div>
                </div>
            `).join('');

        } catch (error) {
            console.error("Error:", error);
            container.innerHTML = "<div class='status-msg'>❌ Failed to load history. Make sure app.py is running!</div>";
        }
    }

    // Refresh history every time the page is loaded
    window.onload = loadHistory;
</script>

</body>
</html>
